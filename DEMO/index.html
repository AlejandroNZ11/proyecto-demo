<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST Countries API</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <h1>Where in the world? </h1>
            <button id="theme-toggle" class="theme-btn">
                <span class="icon">🌙</span> Dark Mode
            </button>
        </div>
    </header>

    <main class="container">
        <div class="controls">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="Search for a country...">
            </div>
            
            <select id="region-filter" class="region-select">
                <option value="all" hidden>Filter by Region</option>
                <option value="Africa">Africa</option>
                <option value="Americas">Americas</option>
                <option value="Asia">Asia</option>
                <option value="Europe">Europe</option>
                <option value="Oceania">Oceania</option>
            </select>
        </div>

        <div id="countries-grid" class="grid">
            </div>
    </main>

    <script src="./js/app.js"></script>
</body>
</html>
